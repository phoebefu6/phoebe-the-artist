  unaware that the statue is hollow and impossible. The visual message: the average customer is a fake artifact
  assembled from customers who do not behave alike. Premium museum editorial set, quiet off-white walls, soft gallery lighting,
  expensive magazine-cover art direction, strong negative space. Luxury editorial surrealism, sculptural realism mixed with
  crisp graphic data ephemera, publication-grade typography, subtle paper grain, refined not flashy. Centered statue as hero,
  title at top with clean generous margin, executive small at lower left for scale, fragments spilling diagonally to create motion.
  Warm ivory, charcoal ink, marble white, muted teal shadows, restrained red for loss notes, small green accent on AVG card.
  Render exactly and clearly: "THE AVERAGE CUSTOMER IS A MYTH"; "AVERAGE CUSTOMER"; "AVG +8%". No other text.
  No visible charts, histograms, dashboards, robots, brains, network nodes, generic AI glow, stock corporate illustration,
  cluttered labels, extra text, watermark, living artist imitation, or brand mimicry.
takeaway: "The average customer is a myth - decide on the distribution, not the mean."
